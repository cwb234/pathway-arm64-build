name: Build pathway ARM64 no-jemalloc

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pathway v0.8.0
        uses: actions/checkout@v3
        with:
          repository: pathwaycom/pathway
          ref: v0.8.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Pull manylinux_2_17 image (fixed tag)
        run: |
          docker pull quay.io/pypa/manylinux_2_17_aarch64:2024-12-01-7ae8cb4

      - name: Create wheels dir
        run: mkdir -p wheels

      - name: Build wheel (manylinux_2_17, glibc 2.17)
        run: |
          docker run --rm --platform linux/arm64 \
            -v $PWD:/src \
            quay.io/pypa/manylinux_2_17_aarch64:2024-12-01-7ae8cb4 \
            bash -c "
            # 安装系统依赖（CentOS 7 包名：pkgconfig）
            yum install -y gcc gcc-c++ make cmake curl pkgconfig openssl-devel git &&

            # 调试：确认 Python 静态库存在
            echo '=== Python libs ===' &&
            ls -la /opt/python/cp311-cp311/lib/libpython* &&

            # 安装 Rust
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y &&
            . /root/.cargo/env &&
            rustup install 1.75.0 &&
            rustup default 1.75.0 &&

            PYTHON=/opt/python/cp311-cp311/bin/python &&

            # 安装 maturin
            \$PYTHON -m pip install maturin &&

            # 强制使用系统 OpenSSL，避免 OpenSSL 源码编译
            export OPENSSL_DIR=/usr &&
            export OPENSSL_NO_VENDOR=1 &&

            # 编译 pathway，禁用 jemalloc
            cd /src &&
            \$PYTHON -m maturin build \
              --release \
              --features standard-allocator \
              --interpreter \$PYTHON \
              --manylinux 2_17 \
              -o /src/wheels/
            "

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: pathway-arm64-no-jemalloc-glibc217
          path: wheels/*.whl
