name: Build pathway ARM64 no-jemalloc

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pathway v0.8.0
        uses: actions/checkout@v3
        with:
          repository: pathwaycom/pathway
          ref: v0.8.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Create wheels dir
        run: mkdir -p wheels

      - name: Build wheel (manylinux2014, glibc 2.17)
        run: |
          docker run --rm --platform linux/arm64 \
            -v $PWD:/src \
            quay.io/pypa/manylinux2014_aarch64:latest \
            bash -c "
            # 安装编译依赖
            yum install -y gcc gcc-c++ make cmake curl pkgconfig openssl-devel git \
                           zlib-devel bzip2-devel readline-devel sqlite-devel \
                           tk-devel xz-devel libffi-devel &&

            # 从源码编译 Python 3.11（带静态库 libpython3.11.a）
            cd /tmp &&
            curl -LO https://www.python.org/ftp/python/3.11.5/Python-3.11.5.tgz &&
            tar xzf Python-3.11.5.tgz &&
            cd Python-3.11.5 &&
            ./configure --enable-optimizations --prefix=/usr/local/python3.11 --with-static-libpython &&
            make -j\$(nproc) &&
            make install &&

            # 设置 Python 路径
            export PATH=/usr/local/python3.11/bin:\$PATH &&
            PYTHON=/usr/local/python3.11/bin/python3.11 &&
            PYTHON_LIB=/usr/local/python3.11/lib &&

            # 验证静态库存在
            echo '=== Python libs ===' &&
            ls -la \$PYTHON_LIB/libpython* &&

            # 安装 maturin
            \$PYTHON -m pip install maturin &&

            # 安装 Rust
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y &&
            . /root/.cargo/env &&
            rustup install 1.75.0 &&
            rustup default 1.75.0 &&

            # 强制使用系统 OpenSSL
            export OPENSSL_DIR=/usr &&
            export OPENSSL_NO_VENDOR=1 &&

            # 编译 pathway，禁用 jemalloc
            cd /src &&
            \$PYTHON -m maturin build \
              --release \
              --features standard-allocator \
              --interpreter \$PYTHON \
              -o /src/wheels/
            "

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: pathway-arm64-no-jemalloc-glibc217
          path: wheels/*.whl
