name: Build pathway ARM64 no-jemalloc

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pathway v0.8.0
        uses: actions/checkout@v3
        with:
          repository: pathwaycom/pathway
          ref: v0.8.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Create wheels dir
        run: mkdir -p wheels

      - name: Build wheel (manylinux2014, glibc 2.17)
        run: |
          docker run --rm --platform linux/arm64 \
            -v $PWD:/src \
            quay.io/pypa/manylinux2014_aarch64:latest \
            bash -c "
            # 安装系统依赖
            yum install -y gcc gcc-c++ make cmake curl pkgconfig openssl-devel git &&

            # 查看可用的 Python 版本
            echo '=== Available Python versions ===' &&
            ls /opt/python/ &&

            # 安装 Rust
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y &&
            . /root/.cargo/env &&
            rustup install 1.75.0 &&
            rustup default 1.75.0 &&

            # 使用 Python 3.11
            PYTHON=/opt/python/cp311-cp311/bin/python &&
            PYTHON_LIB=/opt/python/cp311-cp311/lib &&
            PYTHON_INCLUDE=/opt/python/cp311-cp311/include/python3.11 &&

            # 设置库路径，让 pyo3 能找到 libpython
            export LIBRARY_PATH=\$PYTHON_LIB:\$LIBRARY_PATH &&
            export LD_LIBRARY_PATH=\$PYTHON_LIB:\$LD_LIBRARY_PATH &&
            export C_INCLUDE_PATH=\$PYTHON_INCLUDE:\$C_INCLUDE_PATH &&
            export CPLUS_INCLUDE_PATH=\$PYTHON_INCLUDE:\$CPLUS_INCLUDE_PATH &&

            # 检查 libpython 是否存在（调试用）
            echo '=== Python lib files ===' &&
            ls -la \$PYTHON_LIB/libpython* || echo 'No static lib found' &&
            ls -la \$PYTHON_LIB/libpython*.so || echo 'No shared lib found' &&

            # 安装 maturin
            \$PYTHON -m pip install maturin &&

            # 强制使用系统 OpenSSL，避免 OpenSSL 源码编译
            export OPENSSL_DIR=/usr &&
            export OPENSSL_NO_VENDOR=1 &&

            # 编译 pathway，禁用 jemalloc
            cd /src &&
            \$PYTHON -m maturin build \
              --release \
              --features standard-allocator \
              --interpreter \$PYTHON \
              -o /src/wheels/
            "

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: pathway-arm64-no-jemalloc-glibc217
          path: wheels/*.whl
