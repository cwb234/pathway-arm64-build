name: Build pathway ARM64 no-jemalloc

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pathway v0.8.0
        uses: actions/checkout@v3
        with:
          repository: pathwaycom/pathway
          ref: v0.8.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Create wheels dir
        run: mkdir -p wheels

      - name: Build wheel (manylinux2014, glibc 2.17)
        run: |
          docker run --rm --platform linux/arm64 \
            -v $PWD:/src \
            quay.io/pypa/manylinux2014_aarch64:latest \
            bash -c "
            set -ex &&

            # 安装编译依赖
            yum install -y gcc gcc-c++ make cmake curl pkgconfig git \
                           zlib-devel bzip2-devel readline-devel sqlite-devel \
                           tk-devel xz-devel libffi-devel ncurses-devel &&

            # === 第一步：编译 OpenSSL 1.1.1 ===
            cd /tmp &&
            curl -LO https://www.openssl.org/source/openssl-1.1.1w.tar.gz &&
            tar xzf openssl-1.1.1w.tar.gz &&
            cd openssl-1.1.1w &&
            ./config --prefix=/usr/local/openssl1.1 --openssldir=/usr/local/openssl1.1 shared zlib &&
            make -j\$(nproc) &&
            make install &&
            export LD_LIBRARY_PATH=/usr/local/openssl1.1/lib:\$LD_LIBRARY_PATH &&

            # === 第二步：编译 Python 3.11（带静态库 + 指向 OpenSSL 1.1.1）===
            cd /tmp &&
            curl -LO https://www.python.org/ftp/python/3.11.5/Python-3.11.5.tgz &&
            tar xzf Python-3.11.5.tgz &&
            cd Python-3.11.5 &&
            ./configure \
              --enable-optimizations \
              --prefix=/usr/local/python3.11 \
              --with-static-libpython \
              --with-openssl=/usr/local/openssl1.1 \
              --with-openssl-rpath=auto &&
            make -j\$(nproc) &&
            make install &&

            # 设置路径
            export PATH=/usr/local/python3.11/bin:\$PATH &&
            PYTHON=/usr/local/python3.11/bin/python3.11 &&

            # 验证 SSL
            echo '=== SSL check ===' &&
            \$PYTHON -c 'import ssl; print(ssl.OPENSSL_VERSION)' &&

            # === 第三步：安装 maturin ===
            \$PYTHON -m pip install --upgrade pip &&
            \$PYTHON -m pip install maturin &&

            # === 第四步：安装 Rust ===
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y &&
            . /root/.cargo/env &&
            rustup install 1.75.0 &&
            rustup default 1.75.0 &&

            # 强制使用编译好的 OpenSSL 1.1.1
            export OPENSSL_DIR=/usr/local/openssl1.1 &&
            export OPENSSL_NO_VENDOR=1 &&
            export PKG_CONFIG_PATH=/usr/local/openssl1.1/lib/pkgconfig:\$PKG_CONFIG_PATH &&

            # === 第五步：编译 pathway ===
            cd /src &&
            \$PYTHON -m maturin build \
              --release \
              --features standard-allocator \
              --interpreter \$PYTHON \
              -o /src/wheels/
            "

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: pathway-arm64-no-jemalloc-glibc217
          path: wheels/*.whl
